version: '3.8'

services:
  db:
    image: postgres:15.5
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: e_rh
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - "8081:8080"

volumes:
  pgdata: